<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Stillness Protocol | $STILL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .view { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .banner { background: var(--gold); color: #000; padding: 10px; width: 100%; position: fixed; top: 0; text-align: center; font-weight: 900; z-index: 1000; letter-spacing: 2px; }
        
        #display-stack { width: 640px; height: 480px; border: 4px solid #1a1a1a; position: relative; border-radius: 20px; overflow: hidden; background: #000; }
        video, #feedback-video { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; }
        #webcam { transform: scaleX(-1); opacity: 0.15; z-index: 1; }
        #feedback-video { z-index: 2; opacity: 0.8; }
        
        #status-overlay { position: absolute; top: 40%; width: 100%; text-align: center; font-family: 'Cinzel', serif; font-size: 2.5rem; font-weight: 900; z-index: 10; text-shadow: 0 0 20px #000; }
        .dashboard { background: #0a0a0a; padding: 30px; border-radius: 24px; border: 1px solid #222; text-align: center; min-width: 420px; margin-top: 20px; }
        .btn { padding: 15px 35px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; border-radius: 50px; text-transform: uppercase; margin: 10px; }
    </style>
</head>
<body>

<div class="banner">PHASE I: THE VIGIL | AWAKENING IN <span id="timer">--:--:--</span></div>

<section id="landing" class="view active">
    <h1 style="font-family:'Cinzel'; color:var(--gold); font-size:3.5rem;">THE STILLNESS PROTOCOL</h1>
    <p style="color:#666; max-width:500px; text-align:center;">"Anchor yourself in stillness. This is the edge that cannot be gamed."</p>
    <div class="btn-group">
        <button class="btn" onclick="switchView('session'); startVigil();">Begin Presence</button>
        <button class="btn" style="background:transparent; border:1px solid #444; color:#fff;" onclick="switchView('sutra')">Sutra</button>
    </div>
</section>

<section id="sutra" class="view">
    <div style="max-width:600px; line-height:1.8; color:#aaa; border-left: 1px solid var(--gold); padding-left: 30px;">
        <h2 style="font-family:'Cinzel'; color:var(--gold);">THE SUTRA</h2>
        <p>"From doing, ten thousand transactions arise. From not-doing, one treasury is filled."</p>
        <button class="btn" onclick="window.location.href='whitepaper.pdf'">Download Manifesto</button>
    </div>
    <button class="btn" style="background:#222; color:#fff; margin-top:30px;" onclick="switchView('landing')">Back</button>
</section>

<section id="session" class="view">
    <div id="display-stack">
        <video id="webcam" autoplay playsinline></video>
        <video id="feedback-video" autoplay loop muted></video>
        <div id="status-overlay">SCANNING...</div>
    </div>
    <div class="dashboard">
        <div id="points" style="font-size:3.5rem; color:var(--gold); font-weight:900;">0.00 $STILL</div>
        <div id="v-info" style="color:#ff4444; font-weight:bold; visibility:hidden;">MANDATE VIOLATION: <span id="v-clock">7</span>s</div>
    </div>
</section>

<script>
    // 24H TIMER TO AWAKENING
    let secondsLeft = 86400;
    setInterval(() => {
        let h = Math.floor(secondsLeft / 3600);
        let m = Math.floor((secondsLeft % 3600) / 60);
        let s = secondsLeft % 60;
        document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (secondsLeft > 0) secondsLeft--;
    }, 1000);

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startVigil() {
        const video = document.getElementById('webcam');
        const feedback = document.getElementById('feedback-video');
        const status = document.getElementById('status-overlay');
        const vClock = document.getElementById('v-clock');
        const vInfo = document.getElementById('v-info');
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        const detector = await faceLandmarksDetection.createDetector(
            faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh, { runtime: 'tfjs' }
        );

        let violationStart = null;
        let points = 0;
        let active = true;
        const synth = window.speechSynthesis;

        const loop = setInterval(async () => {
            if (!active) return;

            const faces = await detector.estimateFaces(video);
            if (faces.length > 0) {
                const kp = faces[0].keypoints;
                const eyeGap = Math.abs(kp[159].y - kp[145].y); // Vertical eye gap check
                const noseY = kp[1].y; // Head position check (nose must be above shoulders)
                
                // MANDATE: Eyes closed AND head in upright stillness (nose above Y-240)
                const isCompliant = (eyeGap < 3.8 && noseY < 240);

                if (isCompliant) {
                    violationStart = null;
                    vInfo.style.visibility = "hidden";
                    points += 0.05;
                    status.innerText = "BLUE STATE";
                    status.style.color = "var(--gold)";
                    if (!feedback.src.includes('blue.mp4')) feedback.src = 'blue.mp4';
                } else {
                    if (!violationStart) violationStart = Date.now();
                    const elapsed = (Date.now() - violationStart) / 1000;
                    const remaining = Math.max(0, Math.ceil(7 - elapsed)); // CRITICAL: 7-second violation limit
                    
                    vInfo.style.visibility = "visible";
                    vClock.innerText = remaining;
                    status.innerText = "RED STATE";
                    status.style.color = "red";
                    if (!feedback.src.includes('red.mp4')) feedback.src = 'red.mp4';

                    if (elapsed >= 7) { 
                        active = false;
                        status.innerText = "SESSION SEALED";
                        status.style.color = "white";
                        feedback.pause();
                        synth.speak(new SpeechSynthesisUtterance("Session sealed. Presence recorded."));
                        clearInterval(loop); // Points graduate tomorrow during the Awakening
                    }
                }
                document.getElementById('points').innerText = points.toFixed(2) + " $STILL";
            }
        }, 200);
    }
</script>
</body>
</html>
