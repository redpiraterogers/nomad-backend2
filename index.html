<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad State — Live Miner & Security</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a1f; color: #e0d4ff; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
    #visual-area { width: 100%; max-width: 640px; height: 480px; margin: 20px auto; border-radius: 24px; background: #000; overflow: hidden; border: 2px solid #ffd700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
    video { width: 100%; height: 100%; object-fit: contain; }
    .btn { background: #ffd700; color: #1a0033; border: none; padding: 14px 28px; font-size: 1.1em; margin: 8px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    #status { font-size: 1.4em; margin: 15px 0; min-height: 60px; font-weight: 600; transition: color 0.3s; }
    #live-counter { font-size: 3em; color: #00ff9d; font-weight: bold; text-shadow: 0 0 15px #00ff9d; margin: 10px 0; }
    .warning { color: #ffcc00 !important; }
    .violation { color: #ff3333 !important; }
    #pool-balance { color: #00ff9d; font-size: 1.4em; margin-bottom: 20px; font-weight: bold; }
    #metrics { font-size: 1em; opacity: 0.7; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🪷 Nomad State</h1>
  
  <button id="wallet-btn" class="btn" onclick="connectWallet()" style="background:#9945FF; color:white;">Connect Wallet</button>
  <div id="pool-balance" style="display:none;">Balance: <span id="db-balance">0.00</span> NOMAD</div>
  
  <div id="status">Connect wallet to begin meditation</div>
  <div id="live-counter">0.0000</div>

  <div id="visual-area">
    <video id="buddha-video" loop muted playsinline></video>
  </div>
  
  <button id="start-btn" class="btn" onclick="toggleSession()" disabled>Start Session</button>
  <button id="end-btn" class="btn" onclick="processSessionEnd('Manual')" disabled>End Session</button>

  <div id="metrics">
    Stillness: <span id="stillness">0</span>% | Eyes: <span id="eyes">—</span> | Posture: <span id="spine">—</span>
  </div>

  <script>
    const BACKEND_URL = "https://nomad-backend-u20g.onrender.com";
    let isRunning = false, userWallet = null, liveEarned = 0, tickerInterval = null;
    let poseDetector, faceMesh, camera;
    let eyesOpenTime = 0, badPostureTime = 0, lastFrameTime = 0;
    const VIOLATION_LIMIT = 4000; // 4 seconds

    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('live-counter');
    const buddhaVideo = document.getElementById('buddha-video');

    async function connectWallet() {
      const provider = window?.phantom?.solana || window?.solana;
      try {
        const resp = await provider.connect();
        userWallet = resp.publicKey.toString();
        document.getElementById('wallet-btn').textContent = "Wallet: " + userWallet.slice(0,4)+"...";
        document.getElementById('start-btn').disabled = false;
        fetchBalance();
      } catch (e) { statusEl.textContent = "❌ Wallet Connection Denied"; }
    }

    async function fetchBalance() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/balance/${userWallet}`);
        const data = await res.json();
        document.getElementById('pool-balance').style.display = 'block';
        document.getElementById('db-balance').textContent = (data.balance || 0).toFixed(2);
      } catch (e) { console.log("Balance check failed"); }
    }

    async function toggleSession() {
      statusEl.textContent = "⏳ Syncing with Sangha...";
      try {
        const res = await fetch(`${BACKEND_URL}/api/start-session`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ walletAddress: userWallet })
        });
        if (res.ok) {
          if (!camera) await startCamera();
          isRunning = true;
          liveEarned = 0;
          document.getElementById('start-btn').disabled = true;
          document.getElementById('end-btn').disabled = false;
          statusEl.textContent = "🟢 Mining Active — Eyes Closed";
          statusEl.className = "";
          buddhaVideo.play();
          
          tickerInterval = setInterval(() => {
            liveEarned += 0.00014;
            counterEl.textContent = liveEarned.toFixed(4);
          }, 100);
        }
      } catch (e) { statusEl.textContent = "❌ Connection Error"; }
    }

    function onResults(results) {
      if (!isRunning) return;
      const now = Date.now();
      const delta = lastFrameTime ? (now - lastFrameTime) / 1000 : 0.1;
      lastFrameTime = now;

      let eyesClosed = false;
      let postureGood = false;

      // 1. Check Face/Eyes
      if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
        const lm = results.multiFaceLandmarks[0];
        const leftEAR = (Math.hypot(lm[160].x-lm[144].x, lm[160].y-lm[144].y) + Math.hypot(lm[158].x-lm[153].x, lm[158].y-lm[153].y)) / (2 * Math.hypot(lm[33].x-lm[133].x, lm[33].y-lm[133].y));
        eyesClosed = leftEAR < 0.22;
        document.getElementById('eyes').textContent = eyesClosed ? "✅ Closed" : "⚠️ Open";
      }

      // 2. Check Pose/Posture
      if (results.poseLandmarks) {
        const nose = results.poseLandmarks[0];
        const ls = results.poseLandmarks[11];
        const rs = results.poseLandmarks[12];
        postureGood = nose.y < (ls.y + rs.y) / 2;
        document.getElementById('spine').textContent = postureGood ? "✅ Good" : "⚠️ Low";
      }

      // 3. Rule Enforcement
      if (!eyesClosed) eyesOpenTime += delta * 1000; else eyesOpenTime = 0;
      if (!postureGood) badPostureTime += delta * 1000; else badPostureTime = 0;

      if (eyesOpenTime > VIOLATION_LIMIT || badPostureTime > VIOLATION_LIMIT) {
        processSessionEnd("Rule Violation");
      } else if (eyesOpenTime > 2000 || badPostureTime > 2000) {
        statusEl.textContent = "⚠️ Return to Stillness!";
        statusEl.className = "warning";
      }
    }

    async function processSessionEnd(reason) {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(tickerInterval);
      statusEl.textContent = "⏳ Verifying Session...";
      statusEl.className = "";

      try {
        const res = await fetch(`${BACKEND_URL}/api/end-session`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ walletAddress: userWallet })
        });
        const data = await res.json();
        
        if (data.success) {
          statusEl.innerHTML = `✅ ${reason === 'Manual' ? 'Saved!' : reason} <span style="color:#00ff9d">+${(data.earned || 0).toFixed(2)} NOMAD</span>`;
          await fetchBalance(); // THIS ADDS IT TO YOUR BALANCE DISPLAY REAL-TIME
        }
      } catch (e) { statusEl.textContent = "❌ Save Error"; }
      
      document.getElementById('start-btn').disabled = false;
      document.getElementById('end-btn').disabled = true;
    }

    async function startCamera() {
      poseDetector = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
      faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
      poseDetector.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
      faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
      poseDetector.onResults(onResults);
      faceMesh.onResults(onResults);
      const v = document.createElement('video');
      camera = new Camera(v, { onFrame: async () => { if(isRunning) { await poseDetector.send({image: v}); await faceMesh.send({image: v}); } }, width: 640, height: 480 });
      await camera.start();
    }

    window.onload = () => { buddhaVideo.src = "buddha.mp4"; };
  </script>
</body>
</html>
