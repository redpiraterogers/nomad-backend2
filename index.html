<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad State — Live Miner</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a1f; color: #e0d4ff; text-align: center; margin: 0; padding: 20px; }
    #visual-area { width: 100%; max-width: 600px; height: 400px; margin: 20px auto; border-radius: 20px; background: #000; overflow: hidden; border: 2px solid #ffd700; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .btn { background: #ffd700; color: #1a0033; border: none; padding: 12px 24px; font-size: 1.1em; margin: 5px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    #status { font-size: 1.2em; margin: 20px 0; min-height: 50px; }
    #live-counter { font-size: 2.5em; color: #00ff9d; font-weight: bold; text-shadow: 0 0 15px #00ff9d; margin: 10px 0; }
    #pool-balance { color: #bfa1ff; font-size: 1.1em; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>🪷 Nomad State</h1>
  
  <button id="wallet-btn" class="btn" onclick="connectWallet()" style="background:#9945FF; color:white;">Connect Wallet</button>
  <button id="test-btn" class="btn" onclick="testVoice()" style="background:#444; color:white;">Test Master</button>

  <div id="pool-balance">Total in Sangha: <span id="db-balance">0.00</span> NOMAD</div>
  
  <div id="status">Ready to Mine</div>
  <div id="live-counter">0.0000</div>

  <div id="visual-area">
    <video id="buddha-video" loop muted playsinline></video>
  </div>
  
  <button id="start-btn" class="btn" onclick="toggleSession()" disabled>Start Session</button>
  <button id="end-btn" class="btn" onclick="processSessionEnd('Manual')" disabled>End Session</button>

  <script>
    const BACKEND_URL = "https://nomad-backend-u20g.onrender.com";
    let isRunning = false, userWallet = null, liveEarned = 0, tickerInterval = null;
    const buddhaVideo = document.getElementById('buddha-video');
    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('live-counter');

    function testVoice() {
      const u = new SpeechSynthesisUtterance("The master is awake.");
      u.rate = 0.8; window.speechSynthesis.speak(u);
      statusEl.textContent = "🔊 Audio Active.";
    }

    async function connectWallet() {
      const provider = window?.phantom?.solana || window?.solana;
      const resp = await provider.connect();
      userWallet = resp.publicKey.toString();
      document.getElementById('wallet-btn').textContent = "Wallet: " + userWallet.slice(0,4)+"...";
      document.getElementById('start-btn').disabled = false;
      fetchBalance();
    }

    async function fetchBalance() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/balance/${userWallet}`);
        const data = await res.json();
        document.getElementById('db-balance').textContent = (data.balance || 0).toFixed(2);
      } catch (e) { console.log("Balance fetch failed"); }
    }

    function startLiveTicker() {
      liveEarned = 0;
      tickerInterval = setInterval(() => {
        // This adds roughly 0.0001 NOMAD every 100ms (Real-time feeling)
        liveEarned += 0.00014; 
        counterEl.textContent = liveEarned.toFixed(4);
      }, 100);
    }

    async function toggleSession() {
      statusEl.textContent = "⏳ Syncing with Blockchain...";
      try {
        const res = await fetch(`${BACKEND_URL}/api/start-session`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ walletAddress: userWallet })
        });
        if (res.ok) {
          isRunning = true;
          document.getElementById('start-btn').disabled = true;
          document.getElementById('end-btn').disabled = false;
          statusEl.textContent = "🟢 Mining NOMAD...";
          buddhaVideo.play();
          startLiveTicker();
        } else {
          statusEl.textContent = "❌ Server Refused. Check Render Logs.";
        }
      } catch (e) { statusEl.textContent = "❌ Connection Error."; }
    }

    async function processSessionEnd(reason) {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(tickerInterval);
      statusEl.textContent = "⏳ Saving to Database...";
      
      try {
        const res = await fetch(`${BACKEND_URL}/api/end-session`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ walletAddress: userWallet })
        });
        const data = await res.json();
        statusEl.innerHTML = `✅ Saved! +${(data.earned || 0).toFixed(2)} NOMAD`;
        fetchBalance();
        document.getElementById('start-btn').disabled = false;
        document.getElementById('end-btn').disabled = true;
      } catch (e) { statusEl.textContent = "❌ Save Error."; }
    }

    window.onload = () => { buddhaVideo.src = "buddha.mp4"; };
  </script>
</body>
</html>
