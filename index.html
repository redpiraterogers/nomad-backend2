<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad State — The Master's Voice</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a1f; color: #e0d4ff; text-align: center; margin: 0; padding: 20px; }
    #visual-area { width: 100%; max-width: 640px; height: 360px; margin: 20px auto; border-radius: 20px; background: #000; overflow: hidden; border: 3px solid #ffd700; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 5; }
    #status { font-size: 1.4em; margin: 15px 0; min-height: 40px; font-weight: bold; color: #ffd700; }
    #live-counter { font-size: 3.5em; color: #00ff9d; font-weight: bold; margin: 10px 0; }
    .btn { background: #ffd700; color: #1a0033; border: none; padding: 14px 28px; font-size: 1.1em; margin: 8px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    .good { color: #00ff9d; font-weight: bold; }
    .bad { color: #ff3333; font-weight: bold; }
    #metrics { margin-top: 10px; font-size: 1.2em; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; display: inline-block; }
  </style>
</head>
<body>
  <h1>🪷 Nomad State</h1>
  <div id="wallet-display" style="font-size:0.8em; opacity:0.6;">Disconnected</div>
  
  <button id="wallet-btn" class="btn" onclick="connectWallet()" style="background:#9945FF; color:white;">Connect Wallet</button>
  <button id="test-btn" class="btn" onclick="testVoice()">Test Voice</button>

  <div style="font-size: 1.1em; margin: 10px;">Total Balance: <span id="db-balance">0.00</span> NOMAD</div>
  <div id="live-counter">0.0000</div>
  <div id="status">Ready</div>

  <div id="visual-area">
    <video id="active-video" loop muted playsinline></video>
  </div>
  
  <button id="start-btn" class="btn" onclick="toggleSession()" disabled>Start Session</button>
  <button id="end-btn" class="btn" onclick="processSessionEnd('Manual')" disabled>End Session</button>

  <br>
  <div id="metrics">
    Eyes: <span id="eyes" class="bad">—</span> | Posture: <span id="spine" class="bad">—</span>
  </div>

  <script>
    const BACKEND_URL = "https://nomad-backend-u20g.onrender.com";
    let isRunning = false, userWallet = null, liveEarned = 0, tickerInterval = null;
    let eyesOpenTime = 0, badPostureTime = 0, lastFrameTime = 0, closedFrameCount = 0;
    let poseDetector, faceMesh, camera, activeChallenge = null, challengeTimer = null;

    const videoEl = document.getElementById('active-video');
    const statusEl = document.getElementById('status');
    const eyesEl = document.getElementById('eyes');
    const spineEl = document.getElementById('spine');

    function speak(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.85; u.pitch = 0.7;
      window.speechSynthesis.speak(u);
    }

    function testVoice() { speak("The Master is present. Audio levels confirmed."); }

    async function connectWallet() {
      const provider = window?.phantom?.solana || window?.solana;
      const resp = await provider.connect();
      userWallet = resp.publicKey.toString();
      document.getElementById('wallet-display').textContent = userWallet;
      document.getElementById('start-btn').disabled = false;
      fetchBalance();
    }

    async function fetchBalance() {
      const res = await fetch(`${BACKEND_URL}/api/balance/${userWallet}`);
      const data = await res.json();
      document.getElementById('db-balance').textContent = (data.balance || 0).toFixed(4);
    }

    function triggerChallenge() {
      if (!isRunning) return;
      const prompts = ["tilt your head to the left", "tilt your head to the right", "bow your head forward"];
      activeChallenge = prompts[Math.floor(Math.random() * prompts.length)];
      speak("Please " + activeChallenge);
      statusEl.textContent = "⚡ " + activeChallenge.toUpperCase();

      challengeTimer = setTimeout(() => {
        if (activeChallenge) {
            speak("You have failed the test. Return to mindfulness.");
            processSessionEnd("Kaptcha Failed");
        }
      }, 15000);
    }

    async function toggleSession() {
      if (!camera) await initAI();
      const res = await fetch(`${BACKEND_URL}/api/start-session`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ walletAddress: userWallet })
      });

      if (res.ok) {
        isRunning = true;
        liveEarned = 0;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('end-btn').disabled = false;
        videoEl.src = "buddha.mp4";
        videoEl.play();
        statusEl.textContent = "🟢 Session Active";
        setTimeout(triggerChallenge, 15000);
        tickerInterval = setInterval(() => {
          liveEarned += 0.00018;
          document.getElementById('live-counter').textContent = liveEarned.toFixed(4);
        }, 100);
      }
    }

    function onResults(results) {
      if (!isRunning) return;
      const now = Date.now();
      const delta = lastFrameTime ? (now - lastFrameTime) / 1000 : 0.1;
      lastFrameTime = now;

      let eyesClosed = false;
      if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
        const lm = results.multiFaceLandmarks[0];
        const ear = (Math.hypot(lm[160].y-lm[144].y) + Math.hypot(lm[158].y-lm[153].y)) / (2 * Math.hypot(lm[33].x-lm[133].x));
        if (ear < 0.17) closedFrameCount++; else closedFrameCount = 0;
        eyesClosed = (closedFrameCount >= 35); 
        eyesEl.textContent = eyesClosed ? "✅ Closed" : "⚠️ OPEN";
        eyesEl.className = eyesClosed ? "good" : "bad";
      } else {
        eyesEl.textContent = "❓ Searching...";
      }

      let postureGood = false;
      let currentPose = "center";
      if (results.poseLandmarks) {
        const nose = results.poseLandmarks[0];
        const ls = results.poseLandmarks[11];
        const rs = results.poseLandmarks[12];
        
        postureGood = nose.y < ((ls.y + rs.y) / 2);
        spineEl.textContent = postureGood ? "✅ Head Up" : "⚠️ Slumped";
        spineEl.className = postureGood ? "good" : "bad";

        if (nose.x < ls.x - 0.01) currentPose = "tilt your head to the left";
        else if (nose.x > rs.x + 0.01) currentPose = "tilt your head to the right";
        else if (nose.y > (ls.y + rs.y) / 2 + 0.01) currentPose = "bow your head forward";

        if (activeChallenge && currentPose === activeChallenge) {
          clearTimeout(challengeTimer); // Stop the "Fail" timer
          activeChallenge = null;
          speak("Excellent. Return to center.");
          statusEl.textContent = "✅ SUCCESS";
          setTimeout(() => { 
            if(isRunning) {
                statusEl.textContent = "🟢 Session Active";
                const delay = Math.random() * (1020000 - 180000) + 180000;
                setTimeout(triggerChallenge, delay);
            }
          }, 3000);
        }
      } else {
        spineEl.textContent = "❓ Searching...";
      }

      if (!eyesClosed) eyesOpenTime += delta * 1000; else eyesOpenTime = 0;
      if (!postureGood) badPostureTime += delta * 1000; else badPostureTime = 0;

      if (eyesOpenTime > 7000 || badPostureTime > 12000) {
          speak("You have failed the test. Return to mindfulness.");
          processSessionEnd("Rule Violation");
      }
    }

    async function processSessionEnd(reason) {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(tickerInterval);
      clearTimeout(challengeTimer);
      videoEl.src = "pikachu.mp4";
      videoEl.play();
      statusEl.textContent = "⌛ Syncing...";

      await fetch(`${BACKEND_URL}/api/end-session`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ walletAddress: userWallet, earnedAmount: liveEarned })
      });

      statusEl.innerHTML = `🏁 ${reason}: <span class="good">+${liveEarned.toFixed(4)}</span>`;
      fetchBalance();
      document.getElementById('start-btn').disabled = false;
      document.getElementById('end-btn').disabled = true;
    }

    async function initAI() {
      poseDetector = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
      faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
      poseDetector.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.3 });
      faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.3 });
      poseDetector.onResults(onResults);
      faceMesh.onResults(onResults);
      const v = document.createElement('video');
      camera = new Camera(v, { onFrame: async () => { if(isRunning) { await poseDetector.send({image: v}); await faceMesh.send({image: v}); } } });
      await camera.start();
    }
  </script>
</body>
</html>
