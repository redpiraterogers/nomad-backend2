<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stillness Protocol | $STILL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/facemesh"></script>
    <style>
        body { margin: 0; background: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Vesting Countdown Banner */
        .banner { background: #ffd700; color: #000; padding: 12px; text-align: center; font-weight: 800; position: fixed; top: 0; width: 100%; z-index: 1000; text-transform: uppercase; letter-spacing: 1px; }
        
        .main-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        
        /* Logo from local directory */
        .logo { width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 0 10px #ffd700); }

        /* Video System */
        #display-stack { position: relative; width: 640px; height: 480px; border-radius: 20px; border: 4px solid #1a1a1a; overflow: hidden; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        video, canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; border-radius: 16px; }
        
        /* Layering: Camera (Bottom) -> Feedback Video (Middle) -> UI (Top) */
        #webcam { transform: scaleX(-1); opacity: 0.3; } /* Camera is dimmed to show feedback video better */
        #feedback-video { z-index: 5; object-fit: cover; transition: opacity 0.5s; }
        
        .dashboard { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; text-align: center; min-width: 400px; z-index: 10; }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #ffd700; margin-bottom: 15px; }
        
        .btn-start { background: #ffd700; color: #000; border: none; padding: 18px 45px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255,215,0,0.2); }
        .btn-start:hover { transform: scale(1.05); background: #fff; }
        
        #overlay-status { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 100; font-weight: 900; font-size: 1.5rem; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

<div class="banner">
    ⚠️ Payouts Locked. Accumulate Presence Points. Unlocking in: <span id="timer">--:--:--</span>
</div>

<div class="main-ui">
    <img src="logo.png" alt="Stillness Protocol" class="logo">
    
    <div id="display-stack">
        <video id="webcam" autoplay playsinline></video>
        <video id="feedback-video" autoplay loop muted></video>
        <div id="overlay-status">INITIALIZING AI...</div>
    </div>

    <div class="dashboard">
        <div class="stat-label">Total Presence Accumulation</div>
        <div id="points" class="stat-value">0.00 $STILL</div>
        <button class="btn-start" onclick="initProtocol()">Begin Stillness</button>
    </div>
</div>

<script>
    // 1. DYNAMIC VESTING COUNTDOWN
    const target = new Date("2026-01-10T21:00:00").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer').innerHTML = `${h}h ${m}m ${s}s`;
    }, 1000);

    // 2. AI & VIDEO FEEDBACK LOGIC
    let points = 0;
    const webcam = document.getElementById('webcam');
    const feedback = document.getElementById('feedback-video');
    const status = document.getElementById('overlay-status');
    const pointsDisplay = document.getElementById('points');

    async function initProtocol() {
        status.innerHTML = "LOADING BIOMETRICS...";
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        webcam.srcObject = stream;
        
        const model = await facemesh.load();
        status.innerHTML = "SCANNING...";
        runDetection(model);
    }

    async function runDetection(model) {
        const predictions = await model.estimateFaces(webcam);
        
        if (predictions.length > 0) {
            // SUCCESS: Play Blue.mp4
            if (feedback.src.indexOf('blue.mp4') === -1) {
                feedback.src = 'blue.mp4';
                status.style.color = "#ffd700";
                status.innerHTML = "STILLNESS ACTIVE";
            }
            points += 0.05; // Points accrue while still
            pointsDisplay.innerHTML = points.toFixed(2) + " $STILL";
        } else {
            // FAILURE: Play Red.mp4
            if (feedback.src.indexOf('red.mp4') === -1) {
                feedback.src = 'red.mp4';
                status.style.color = "#ff4444";
                status.innerHTML = "VIOLATION DETECTED";
            }
        }
        
        requestAnimationFrame(() => runDetection(model));
    }
</script>

</body>
</html>
