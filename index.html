<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad State — Final Sync</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a1f; color: #e0d4ff; text-align: center; margin: 0; padding: 20px; }
    h1 { color: #ffd700; text-shadow: 0 0 20px #ffd700; margin-bottom: 5px; }
    #wallet-display { font-size: 0.9em; color: #9945FF; margin-bottom: 15px; font-family: monospace; word-break: break-all; max-width: 400px; margin-left: auto; margin-right: auto; }
    #visual-area { width: 100%; max-width: 640px; height: 360px; margin: 20px auto; border-radius: 20px; background: #000; overflow: hidden; border: 3px solid #ffd700; position: relative; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .btn { background: #ffd700; color: #1a0033; border: none; padding: 14px 28px; font-size: 1.1em; margin: 8px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    #status { font-size: 1.4em; margin: 15px 0; min-height: 40px; font-weight: bold; }
    #live-counter { font-size: 3.5em; color: #00ff9d; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
    #db-balance { color: #00ff9d; font-weight: bold; }
    .rules { font-size: 0.85em; color: #bfa1ff; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; max-width: 500px; margin: 10px auto; }
    .bad { color: #ff3333; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🪷 Nomad State</h1>
  <div id="wallet-display">Wallet Not Connected</div>
  
  <button id="wallet-btn" class="btn" onclick="connectWallet()" style="background:#9945FF; color:white;">Connect Phantom</button>
  <button id="test-btn" class="btn" onclick="testVoice()" style="background:#444; color:white;">Test Master</button>

  <div style="font-size: 1.2em; margin-top: 10px;">Total Accumulated: <span id="db-balance">0.00</span> NOMAD</div>
  <div id="live-counter">0.0000</div>
  <div id="status">Ready</div>

  <div id="visual-area">
    <video id="buddha-video" loop muted playsinline></video>
    <video id="pikachu-video" loop muted playsinline></video>
    <div id="cam-placeholder" style="color: #333;">Camera Feed Standby</div>
  </div>
  
  <div class="rules">
    <b>Rules:</b> Eyes Closed & Head Upright. Points accumulate continuously.<br>
    <b>Threshold:</b> Reach <b>10.00 NOMAD</b> to unlock Mint/Transfer.
  </div>

  <button id="start-btn" class="btn" onclick="toggleSession()" disabled>Start Session</button>
  <button id="end-btn" class="btn" onclick="processSessionEnd('Finished')" disabled>End Session</button>

  <div id="metrics" style="margin-top:10px; opacity:0.8;">
    Eyes: <span id="eyes">—</span> | Posture: <span id="spine">—</span>
  </div>

  <script>
    const BACKEND_URL = "https://nomad-backend-u20g.onrender.com";
    let isRunning = false, userWallet = null, liveEarned = 0, tickerInterval = null;
    let eyesOpenTime = 0, badPostureTime = 0, lastFrameTime = 0, closedFrameCount = 0;
    let poseDetector, faceMesh, camera;

    const buddhaVideo = document.getElementById('buddha-video');
    const pikachuVideo = document.getElementById('pikachu-video');
    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('live-counter');

    function testVoice() {
      const u = new SpeechSynthesisUtterance("The master is awake.");
      u.rate = 0.8; window.speechSynthesis.speak(u);
      statusEl.textContent = "🔊 Audio Active.";
    }

    async function connectWallet() {
      const provider = window?.phantom?.solana || window?.solana;
      const resp = await provider.connect();
      userWallet = resp.publicKey.toString();
      document.getElementById('wallet-display').textContent = "ID: " + userWallet;
      document.getElementById('wallet-btn').style.display = "none";
      document.getElementById('start-btn').disabled = false;
      fetchBalance();
    }

    async function fetchBalance() {
      const res = await fetch(`${BACKEND_URL}/api/balance/${userWallet}`);
      const data = await res.json();
      document.getElementById('db-balance').textContent = (data.balance || 0).toFixed(4);
    }

    async function toggleSession() {
      if (!camera) {
        statusEl.textContent = "🎥 Waking Camera...";
        await initAI();
      }
      
      const res = await fetch(`${BACKEND_URL}/api/start-session`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ walletAddress: userWallet })
      });

      if (res.ok) {
        isRunning = true;
        liveEarned = 0;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('end-btn').disabled = false;
        
        buddhaVideo.style.display = "block";
        pikachuVideo.style.display = "none";
        buddhaVideo.play();

        statusEl.textContent = "🟢 Mining Active";
        tickerInterval = setInterval(() => {
          liveEarned += 0.00018; // Speed of accumulation
          counterEl.textContent = liveEarned.toFixed(4);
        }, 100);
      }
    }

    function onResults(results) {
      if (!isRunning) return;
      const now = Date.now();
      const delta = lastFrameTime ? (now - lastFrameTime) / 1000 : 0.1;
      lastFrameTime = now;

      let eyesClosed = false;
      if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
        const lm = results.multiFaceLandmarks[0];
        const ear = (Math.hypot(lm[160].x-lm[144].x, lm[160].y-lm[144].y) + Math.hypot(lm[158].x-lm[153].x, lm[158].y-lm[153].y)) / (2 * Math.hypot(lm[33].x-lm[133].x, lm[33].y-lm[133].y));
        if (ear < 0.22) closedFrameCount++; else closedFrameCount = 0;
        eyesClosed = (closedFrameCount >= 20); 
        document.getElementById('eyes').textContent = eyesClosed ? "✅" : "⚠️ OPEN";
        document.getElementById('eyes').className = eyesClosed ? "" : "bad";
      }

      let postureGood = false;
      if (results.poseLandmarks) {
        const nose = results.poseLandmarks[0];
        postureGood = nose.y < (results.poseLandmarks[11].y + results.poseLandmarks[12].y) / 2;
        document.getElementById('spine').textContent = postureGood ? "✅" : "⚠️ LOW";
      }

      if (!eyesClosed || !postureGood) {
        if(!eyesClosed) eyesOpenTime += delta * 1000;
        if(!postureGood) badPostureTime += delta * 1000;
        statusEl.textContent = "🛑 Violation!";
      } else {
        eyesOpenTime = 0; badPostureTime = 0;
        statusEl.textContent = "🟢 Mining Active";
      }

      if (eyesOpenTime > 4000 || badPostureTime > 4000) processSessionEnd("Auto-Kick");
    }

    async function processSessionEnd(reason) {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(tickerInterval);
      
      buddhaVideo.pause();
      buddhaVideo.style.display = "none";
      pikachuVideo.style.display = "block";
      pikachuVideo.play();

      statusEl.textContent = "⌛ Saving...";

      const res = await fetch(`${BACKEND_URL}/api/end-session`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ 
          walletAddress: userWallet,
          earnedAmount: liveEarned // SENDING THE REAL TICKER VALUE
        })
      });

      const data = await res.json();
      statusEl.innerHTML = `🏁 ${reason}: <span style="color:#00ff9d">+${liveEarned.toFixed(4)}</span>`;
      fetchBalance();
      
      document.getElementById('start-btn').disabled = false;
      document.getElementById('end-btn').disabled = true;
    }

    async function initAI() {
      poseDetector = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
      faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
      poseDetector.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
      faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
      poseDetector.onResults(onResults);
      faceMesh.onResults(onResults);
      const v = document.createElement('video');
      camera = new Camera(v, { onFrame: async () => { if(isRunning) { await poseDetector.send({image: v}); await faceMesh.send({image: v}); } }, width: 640, height: 480 });
      await camera.start();
    }

    window.onload = () => { 
      buddhaVideo.src = "buddha.mp4"; 
      pikachuVideo.src = "pikachu.mp4"; 
    };
  </script>
</body>
</html>
