<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad State — Fixed Security</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a1f; color: #e0d4ff; text-align: center; margin: 0; padding: 20px; }
    #visual-area { width: 100%; max-width: 600px; height: 400px; margin: 20px auto; border-radius: 20px; background: #000; overflow: hidden; border: 2px solid #ffd700; position: relative; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .btn { background: #ffd700; color: #1a0033; border: none; padding: 14px 28px; font-size: 1.1em; margin: 8px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    .btn:disabled { background: #444; color: #888; }
    #status { font-size: 1.4em; margin: 15px 0; min-height: 60px; font-weight: bold; }
    #live-counter { font-size: 3.5em; color: #00ff9d; font-weight: bold; text-shadow: 0 0 15px #00ff9d; }
    .violation-text { color: #ff3333 !important; animation: blink 0.5s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }
    #metrics { margin-top: 15px; font-size: 1.1em; color: #bfa1ff; }
    .good { color: #00ff9d; }
    .bad { color: #ff3333; }
  </style>
</head>
<body>
  <h1>🪷 Nomad State</h1>
  
  <button id="wallet-btn" class="btn" onclick="connectWallet()" style="background:#9945FF; color:white;">Connect Wallet</button>
  <div style="font-size: 1.2em; margin: 10px;">Sangha Balance: <span id="db-balance" class="good">0.00</span> NOMAD</div>
  
  <div id="live-counter">0.0000</div>
  <div id="status">Waiting for Wallet...</div>

  <div id="visual-area"><video id="buddha-video" loop muted playsinline></video></div>
  
  <button id="start-btn" class="btn" onclick="toggleSession()" disabled>Start Session</button>
  <button id="end-btn" class="btn" onclick="processSessionEnd('Manual')" disabled>End Session</button>

  <div id="metrics">
    Eyes: <span id="eyes">—</span> | Posture: <span id="spine">—</span>
  </div>

  <script>
    const BACKEND_URL = "https://nomad-backend-u20g.onrender.com";
    let isRunning = false, userWallet = null, liveEarned = 0, tickerInterval = null;
    let eyesOpenTime = 0, badPostureTime = 0, lastFrameTime = 0;
    let poseDetector, faceMesh, camera;

    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('live-counter');

    async function connectWallet() {
      const provider = window?.phantom?.solana || window?.solana;
      const resp = await provider.connect();
      userWallet = resp.publicKey.toString();
      document.getElementById('wallet-btn').textContent = "Wallet Connected";
      document.getElementById('start-btn').disabled = false;
      fetchBalance();
      statusEl.textContent = "Ready to Meditate";
    }

    async function fetchBalance() {
      const res = await fetch(`${BACKEND_URL}/api/balance/${userWallet}`);
      const data = await res.json();
      document.getElementById('db-balance').textContent = (data.balance || 0).toFixed(2);
    }

    async function toggleSession() {
      statusEl.textContent = "⌛ Starting Session...";
      const res = await fetch(`${BACKEND_URL}/api/start-session`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ walletAddress: userWallet })
      });
      if (res.ok) {
        if (!camera) await initAI();
        isRunning = true;
        liveEarned = 0;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('end-btn').disabled = false;
        statusEl.textContent = "🟢 Mining: Close Eyes Now";
        tickerInterval = setInterval(() => {
          liveEarned += 0.00015;
          counterEl.textContent = liveEarned.toFixed(4);
        }, 100);
      }
    }

    function onResults(results) {
      if (!isRunning) return;
      const now = Date.now();
      const delta = lastFrameTime ? (now - lastFrameTime) / 1000 : 0.1;
      lastFrameTime = now;

      let eyesClosed = false;
      let postureGood = false;

      // 1. Eye Detection
      if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
        const lm = results.multiFaceLandmarks[0];
        const ear = (Math.hypot(lm[160].x-lm[144].x, lm[160].y-lm[144].y) + Math.hypot(lm[158].x-lm[153].x, lm[158].y-lm[153].y)) / (2 * Math.hypot(lm[33].x-lm[133].x, lm[33].y-lm[133].y));
        eyesClosed = ear < 0.22;
        document.getElementById('eyes').textContent = eyesClosed ? "✅ Closed" : "⚠️ OPEN";
        document.getElementById('eyes').className = eyesClosed ? "good" : "bad";
      }

      // 2. Posture Detection
      if (results.poseLandmarks) {
        const nose = results.poseLandmarks[0];
        const ls = results.poseLandmarks[11];
        const rs = results.poseLandmarks[12];
        postureGood = nose.y < (ls.y + rs.y) / 2;
        document.getElementById('spine').textContent = postureGood ? "✅ Good" : "⚠️ Slumping";
        document.getElementById('spine').className = postureGood ? "good" : "bad";
      }

      // 3. Violation Logic
      if (!eyesClosed || !postureGood) {
        if (!eyesClosed) eyesOpenTime += delta * 1000;
        if (!postureGood) badPostureTime += delta * 1000;
        statusEl.textContent = "🛑 VIOLATION DETECTED!";
        statusEl.className = "violation-text";
      } else {
        eyesOpenTime = 0; badPostureTime = 0;
        statusEl.textContent = "🟢 Mining Active";
        statusEl.className = "";
      }

      if (eyesOpenTime > 4000 || badPostureTime > 4000) {
        processSessionEnd("Auto-Kick: Rules Broken");
      }
    }

    async function processSessionEnd(reason) {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(tickerInterval);
      statusEl.textContent = "⌛ Saving Session...";
      const res = await fetch(`${BACKEND_URL}/api/end-session`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ walletAddress: userWallet })
      });
      const data = await res.json();
      statusEl.innerHTML = `✅ ${reason}: <span class="good">+${(data.earned || 0).toFixed(2)} NOMAD</span>`;
      fetchBalance();
      document.getElementById('start-btn').disabled = false;
      document.getElementById('end-btn').disabled = true;
    }

    async function initAI() {
      poseDetector = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
      faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
      poseDetector.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
      faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
      poseDetector.onResults(onResults);
      faceMesh.onResults(onResults);
      const v = document.createElement('video');
      camera = new Camera(v, { onFrame: async () => { if(isRunning) { await poseDetector.send({image: v}); await faceMesh.send({image: v}); } }, width: 640, height: 480 });
      await camera.start();
    }
    window.onload = () => { document.getElementById('buddha-video').src = "buddha.mp4"; };
  </script>
</body>
</html>
