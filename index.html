<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad State — Unhideable Slider</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a1f; color: #e0d4ff; text-align: center; margin: 0; padding: 20px; }
    #visual-area { width: 100%; max-width: 640px; height: 360px; margin: 20px auto; border-radius: 20px; background: #000; overflow: hidden; border: 3px solid #ffd700; position: relative; }
    video.main-vid { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 5; }
    #hidden-webcam { display: none; } 
    #status { font-size: 1.4em; margin: 15px 0; min-height: 40px; font-weight: bold; color: #ffd700; text-transform: uppercase; }
    #live-counter { font-size: 3.5em; color: #00ff9d; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
    .btn { background: #ffd700; color: #1a0033; border: none; padding: 14px 28px; font-size: 1.1em; margin: 8px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    .good { color: #00ff9d; font-weight: bold; }
    .bad { color: #ff3333; font-weight: bold; }
    #metrics { margin-top: 10px; font-size: 1.2em; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; display: inline-block; }
    
    /* UNHIDEABLE SLIDER UI - Moved outside the video */
    #slider-wrapper {
      display: none; /* Hidden until Kaptcha starts */
      margin: 20px auto;
      padding: 30px;
      background: #1a0033;
      border: 4px solid #00ff9d;
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 0 30px #00ff9d;
    }
    #slider-wrapper p { font-size: 1.5em; font-weight: bold; margin: 0 0 20px 0; color: #fff; }
    input[type=range] { width: 100%; height: 20px; cursor: pointer; accent-color: #00ff9d; }
  </style>
</head>
<body>
  <h1>🪷 Nomad State</h1>
  <div id="wallet-display" style="font-size:0.8em; opacity:0.6;">Disconnected</div>
  
  <button id="wallet-btn" class="btn" onclick="connectWallet()" style="background:#9945FF; color:white;">Connect Wallet</button>
  <button id="test-btn" class="btn" onclick="testVoice()" style="background:#444; color:white;">Test Audio</button>

  <div style="font-size: 1.1em; margin: 10px;">Total Balance: <span id="db-balance">0.00</span> NOMAD</div>
  <div id="live-counter">0.0000</div>
  <div id="status">Ready to Begin</div>

  <div id="visual-area">
    <video id="active-video" class="main-vid" loop muted playsinline></video>
    <video id="hidden-webcam" autoplay playsinline muted></video>
  </div>

  <div id="slider-wrapper">
    <p>🧘 Slide to 100% to Center Energy</p>
    <input type="range" id="zen-slider" min="0" max="100" value="0">
  </div>

  <button id="start-btn" class="btn" onclick="toggleSession()" disabled>Start Session</button>
  <button id="end-btn" class="btn" onclick="processSessionEnd('Manual')" disabled>End Session</button>

  <br>
  <div id="metrics">
    Eyes: <span id="eyes" class="bad">Waiting...</span> | Posture: <span id="spine" class="bad">Waiting...</span>
  </div>

  <script>
    const BACKEND_URL = "https://nomad-backend-u20g.onrender.com";
    let isRunning = false, userWallet = null, liveEarned = 0, tickerInterval = null;
    let eyesOpenTime = 0, badPostureTime = 0, lastFrameTime = 0, closedFrameCount = 0;
    let faceMesh, camera;
    
    // Slider State
    let challengeActive = false, challengeTimer = null;
    let violationPaused = false; 

    function speak(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.85; u.pitch = 0.6;
      window.speechSynthesis.speak(u);
    }

    function testVoice() { speak("The Master's audio is ready."); }

    async function connectWallet() {
      const provider = window?.phantom?.solana || window?.solana;
      if (!provider) return alert("Phantom wallet not found!");
      const resp = await provider.connect();
      userWallet = resp.publicKey.toString();
      document.getElementById('wallet-display').textContent = userWallet;
      document.getElementById('start-btn').disabled = false;
      fetchBalance();
    }

    async function fetchBalance() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/balance/${userWallet}`);
        const data = await res.json();
        document.getElementById('db-balance').textContent = (data.balance || 0).toFixed(4);
      } catch(e) {}
    }

    function triggerChallenge() {
      if (!isRunning) return;
      
      violationPaused = true; 
      speak("Center your energy.");
      document.getElementById('status').textContent = "🧘 PREPARING...";
      document.getElementById('status').className = "";

      setTimeout(() => {
        if(!isRunning) return;
        
        // Show the massive slider wrapper below the video
        document.getElementById('slider-wrapper').style.display = "block";
        document.getElementById('zen-slider').value = 0;
        document.getElementById('status').textContent = "👉 DRAG SLIDER TO 100%";
        document.getElementById('status').className = "bad";
        
        challengeActive = true;
        
        challengeTimer = setTimeout(() => {
          if (challengeActive) {
            speak("You have lost focus.");
            processSessionEnd("Slider Timeout");
          }
        }, 15000); 
      }, 2000); 
    }

    document.getElementById('zen-slider').addEventListener('input', function() {
      if (!challengeActive || !isRunning) return;
      
      if (this.value == 100) {
        clearTimeout(challengeTimer);
        challengeActive = false;
        document.getElementById('slider-wrapper').style.display = "none";
        
        document.getElementById('status').textContent = "✅ ENERGY BALANCED";
        document.getElementById('status').className = "good";
        speak("Excellent.");

        setTimeout(() => {
          if(isRunning) {
            document.getElementById('status').textContent = "🟢 Session Active";
            violationPaused = false; 
            
            const delay = Math.random() * (900000 - 180000) + 180000;
            setTimeout(triggerChallenge, delay);
          }
        }, 2000);
      }
    });

    async function toggleSession() {
      document.getElementById('status').textContent = "⌛ Booting AI Engine...";
      try { if (!camera) await initAI(); } catch(e) { return; }
      
      try {
        const res = await fetch(`${BACKEND_URL}/api/start-session`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ walletAddress: userWallet })
        });
        
        if (res.ok) {
          isRunning = true; 
          liveEarned = 0;
          violationPaused = false; 
          
          document.getElementById('start-btn').disabled = true;
          document.getElementById('end-btn').disabled = false;
          
          const v = document.getElementById('active-video');
          v.src = "buddha.mp4";
          v.play();
          
          document.getElementById('status').textContent = "🟢 Session Active";
          document.getElementById('status').className = "good";
          
          setTimeout(triggerChallenge, 15000);
          
          tickerInterval = setInterval(() => {
            liveEarned += 0.00018;
            document.getElementById('live-counter').textContent = liveEarned.toFixed(4);
          }, 100);
        }
      } catch(e) {}
    }

    function onResults(results) {
      if (!isRunning) return;
      const now = Date.now();
      const delta = lastFrameTime ? (now - lastFrameTime) / 1000 : 0.1;
      lastFrameTime = now;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const lm = results.multiFaceLandmarks[0];
        
        const ear = (Math.hypot(lm[159].x - lm[145].x, lm[159].y - lm[145].y) + Math.hypot(lm[158].x - lm[153].x, lm[158].y - lm[153].y)) / (2 * Math.hypot(lm[33].x - lm[133].x, lm[33].y - lm[133].y));
        if (ear < 0.18) closedFrameCount++; else closedFrameCount = 0;
        const eyesClosed = closedFrameCount >= 20; 
        
        document.getElementById('eyes').textContent = eyesClosed ? "✅ Closed" : "⚠️ OPEN";
        document.getElementById('eyes').className = eyesClosed ? "good" : "bad";
        
        const postureGood = lm[1].y < 0.95; 
        
        document.getElementById('spine').textContent = postureGood ? "✅ Upright" : "⚠️ Slumping";
        document.getElementById('spine').className = postureGood ? "good" : "bad";

        if (!violationPaused) {
            if (!eyesClosed) eyesOpenTime += delta * 1000; else eyesOpenTime = 0;
            if (!postureGood) badPostureTime += delta * 1000; else badPostureTime = 0;

            if (eyesOpenTime > 6000 || badPostureTime > 10000) {
              speak("You have broken the rules of the Sangha.");
              processSessionEnd("Rule Violation");
            }
        } else {
            eyesOpenTime = 0;
            badPostureTime = 0;
        }

      } else {
         document.getElementById('eyes').textContent = "❓ Face Lost";
         document.getElementById('spine').textContent = "❓ Face Lost";
      }
    }

    async function processSessionEnd(reason) {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(tickerInterval);
      clearTimeout(challengeTimer);
      challengeActive = false;
      violationPaused = false;
      document.getElementById('slider-wrapper').style.display = "none";
      
      const v = document.getElementById('active-video');
      v.src = "pikachu.mp4";
      v.play();
      
      document.getElementById('status').textContent = "⌛ Syncing...";
      document.getElementById('status').className = "";

      try {
          await fetch(`${BACKEND_URL}/api/end-session`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ walletAddress: userWallet, earnedAmount: liveEarned })
          });
          document.getElementById('status').innerHTML = `🏁 ${reason}: <span class="good">+${liveEarned.toFixed(4)}</span>`;
          fetchBalance();
      } catch(e) {}
      
      document.getElementById('start-btn').disabled = false;
      document.getElementById('end-btn').disabled = true;
    }

    async function initAI() {
      faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}` });
      faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
      faceMesh.onResults(onResults);
      
      const webcam = document.getElementById('hidden-webcam');
      camera = new Camera(webcam, { 
          onFrame: async () => { if(isRunning) await faceMesh.send({image: webcam}); },
          width: 640, height: 480
      });
      await camera.start();
    }
  </script>
</body>
</html>
