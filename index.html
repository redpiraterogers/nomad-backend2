<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Stillness Protocol | $STILL</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .view { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .banner { background: var(--gold); color: #000; padding: 10px; width: 100%; position: fixed; top: 0; text-align: center; font-weight: 900; z-index: 1000; letter-spacing: 2px; }
        
        #display-stack { width: 640px; height: 480px; border: 4px solid #1a1a1a; position: relative; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 0 50px rgba(255,215,0,0.1); }
        video, #feedback-video { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; }
        #webcam { transform: scaleX(-1); opacity: 0.15; z-index: 1; }
        #feedback-video { z-index: 2; opacity: 0.8; }
        
        #status-overlay { position: absolute; top: 40%; width: 100%; text-align: center; font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900; z-index: 10; text-shadow: 0 0 20px #000; transition: 0.3s; }
        .dashboard { background: #0a0a0a; padding: 25px; border-radius: 24px; border: 1px solid #222; text-align: center; min-width: 420px; margin-top: 20px; }
        .btn { padding: 15px 35px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; border-radius: 50px; text-transform: uppercase; margin: 10px; transition: 0.2s; }
        .btn:hover { transform: scale(1.05); background: #fff; }

        /* PDF Viewer Container */
        #pdf-viewer { width: 80%; height: 70vh; border: 1px solid var(--gold); margin-bottom: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="banner">STILLNESS LEDGER ACTIVE | UNLOCKING: <span id="timer">24:00:00</span></div>

<section id="view-landing" class="view active">
    <h1 style="font-family:'Cinzel'; color:var(--gold); font-size:3rem; text-align: center;">THE STILLNESS PROTOCOL</h1>
    <div class="btn-group">
        <button class="btn" onclick="switchView('view-session'); startVigil();">Begin Session</button>
        <button class="btn" style="background:transparent; border:1px solid #444; color:#fff;" onclick="switchView('view-sutra')">View Sutra</button>
    </div>
</section>

<section id="view-sutra" class="view">
    <h2 style="font-family:'Cinzel'; color:var(--gold);">THE SUTRA (WHITE PAPER)</h2>
    <iframe id="pdf-viewer" src="whitepaper.pdf#toolbar=0"></iframe>
    <div class="btn-group">
        <button class="btn" onclick="window.open('whitepaper.pdf', '_blank')">Download PDF</button>
        <button class="btn" style="background:#222; color:#fff;" onclick="switchView('view-landing')">Back</button>
    </div>
</section>

<section id="view-session" class="view">
    <div id="display-stack">
        <video id="webcam" autoplay playsinline></video>
        <video id="feedback-video" autoplay loop muted playsinline></video>
        <div id="status-overlay">AWAITING PRESENCE</div>
    </div>
    <div class="dashboard">
        <div id="points" style="font-size:3.5rem; color:var(--gold); font-weight:900;">0.00 $STILL</div>
        <div id="violation-info" style="color:#ff4444; font-weight:bold; visibility:hidden;">VIOLATION: <span id="violation-clock">12</span>s</div>
    </div>
</section>

<script>
    let timeLeft = 86400; // 24 Hours
    setInterval(() => {
        let h = Math.floor(timeLeft / 3600);
        let m = Math.floor((timeLeft % 3600) / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (timeLeft > 0) timeLeft--;
    }, 1000);

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startVigil() {
        const video = document.getElementById('webcam');
        const feedback = document.getElementById('feedback-video');
        const status = document.getElementById('status-overlay');
        const vClock = document.getElementById('violation-clock');
        const vInfo = document.getElementById('violation-info');
        const pointsDisplay = document.getElementById('points');
        
        // REQUEST CAMERA
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;

        // LOAD AI
        const detector = await faceLandmarksDetection.createDetector(
            faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh, { runtime: 'tfjs' }
        );

        let violationStartTime = null;
        let points = 0;
        let sessionActive = true;

        const checkLoop = async () => {
            if (!sessionActive) return;

            const faces = await detector.estimateFaces(video);
            if (faces.length > 0) {
                const kp = faces[0].keypoints;
                
                // 1. EYE SCANNER (Top eyelid to Bottom eyelid)
                const leftEyeGap = Math.abs(kp[159].y - kp[145].y);
                const rightEyeGap = Math.abs(kp[386].y - kp[374].y);
                const eyesClosed = (leftEyeGap < 4.0 && rightEyeGap < 4.0);

                // 2. POSTURE SCANNER (Nose Y position - Higher value = Lower head)
                const noseY = kp[1].y; 
                const headAboveShoulders = (noseY < 280); // Threshold for centered head

                const isCompliant = eyesClosed && headAboveShoulders;

                if (isCompliant) {
                    violationStartTime = null;
                    vInfo.style.visibility = "hidden";
                    points += 0.05;
                    status.innerText = "STILLNESS ACTIVE";
                    status.style.color = "var(--gold)";
                    if (!feedback.src.includes('blue.mp4')) {
                        feedback.src = 'blue.mp4';
                        feedback.play();
                    }
                } else {
                    if (!violationStartTime) violationStartTime = Date.now();
                    const elapsed = (Date.now() - violationStartTime) / 1000;
                    const remaining = Math.max(0, Math.ceil(12 - elapsed));
                    
                    vInfo.style.visibility = "visible";
                    vClock.innerText = remaining;
                    status.innerText = !eyesClosed ? "EYES MUST BE CLOSED" : "RESTORE POSTURE";
                    status.style.color = "red";
                    
                    if (!feedback.src.includes('red.mp4')) {
                        feedback.src = 'red.mp4';
                        feedback.play();
                    }

                    if (elapsed >= 12) {
                        sessionActive = false;
                        status.innerText = "SESSION SEALED";
                        status.style.color = "white";
                        feedback.pause();
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Session terminated. Presence recorded."));
                        return;
                    }
                }
                pointsDisplay.innerText = points.toFixed(2) + " $STILL";
            }
            requestAnimationFrame(checkLoop);
        };

        checkLoop();
    }
</script>
</body>
</html>
